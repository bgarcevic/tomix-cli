name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: publish ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            archive: zip
            exe: tx.exe
          - rid: win-arm64
            archive: zip
            exe: tx.exe
          - rid: osx-x64
            archive: tar.gz
            exe: tx
          - rid: osx-arm64
            archive: tar.gz
            exe: tx
          - rid: linux-x64
            archive: tar.gz
            exe: tx
          - rid: linux-arm64
            archive: tar.gz
            exe: tx

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -m:1 --configuration Release --no-restore

      - name: Test
        run: dotnet test -m:1 --configuration Release --no-build

      - name: Publish
        run: >
          dotnet publish src/Tomix.Cli/Tomix.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output artifacts/publish/${{ matrix.rid }}
          -p:PublishSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Stage
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"
          publish_dir="artifacts/publish/${rid}"
          stage_dir="artifacts/stage/tx-${rid}"
          mkdir -p "${stage_dir}"
          cp -R "${publish_dir}/." "${stage_dir}/"
          rm -f "${stage_dir}/Tomix.Cli.pdb"
          if [[ -f "${stage_dir}/Tomix.Cli.exe" ]]; then
            mv "${stage_dir}/Tomix.Cli.exe" "${stage_dir}/${{ matrix.exe }}"
          elif [[ -f "${stage_dir}/Tomix.Cli" ]]; then
            mv "${stage_dir}/Tomix.Cli" "${stage_dir}/${{ matrix.exe }}"
          fi
          cp LICENSE README.md "${stage_dir}/"

      - name: Archive
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"
          mkdir -p artifacts/packages
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd artifacts/stage && zip -qr "../packages/tx-${rid}.zip" "tx-${rid}")
          else
            tar -C artifacts/stage -czf "artifacts/packages/tx-${rid}.tar.gz" "tx-${rid}"
          fi

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: tx-${{ matrix.rid }}
          path: artifacts/packages/*
          if-no-files-found: error

  pack:
    name: pack tool
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: dotnet pack src/Tomix.Cli/Tomix.Cli.csproj --configuration Release --output artifacts/packages

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: tx-tool-package
          path: artifacts/packages/*.nupkg
          if-no-files-found: error

  release:
    name: create release
    needs: [publish, pack]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write # OIDC token for NuGet Trusted Publishing
    env:
      NUGET_USER: ${{ secrets.NUGET_USER }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/packages
          pattern: tx-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts/packages
        run: sha256sum tx-*.zip tx-*.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            artifacts/packages/tx-*.zip
            artifacts/packages/tx-*.tar.gz
            artifacts/packages/checksums.txt
          generate_release_notes: true
          draft: false
          # Hyphenated tags (v0.1.0-rc.1) are prereleases: excluded from
          # /releases/latest, so install.sh and `tx update` never see them.
          prerelease: ${{ contains(github.ref_name, '-') }}

      # NuGet publishing runs after the GitHub Release so a nuget.org outage can
      # never block the binary channel. Trusted Publishing (OIDC) replaces a
      # long-lived API key: NuGet/login exchanges this job's GitHub OIDC token
      # for a 1-hour key, authorized by the policy configured on nuget.org
      # (owner bgarcevic, repo tomix-cli, workflow file release.yml). All steps
      # no-op when the NUGET_USER secret (nuget.org profile name) is unset
      # (forks); --skip-duplicate keeps tag re-runs idempotent.
      - name: Setup .NET
        if: env.NUGET_USER != ''
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: NuGet login (OIDC)
        if: env.NUGET_USER != ''
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ env.NUGET_USER }}

      - name: Push to NuGet
        if: env.NUGET_USER != ''
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: >
          dotnet nuget push artifacts/packages/*.nupkg
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
