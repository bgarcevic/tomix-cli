name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore
      # Formatting is platform-independent; verify on one leg to keep CI fast.
      - run: dotnet format --verify-no-changes --no-restore
        if: matrix.os == 'ubuntu-latest'
      # The warning baseline is zero (analyzer levels in .editorconfig); keep it that way.
      - run: dotnet build -m:1 --configuration Release --no-restore -warnaserror
      - run: dotnet test -m:1 --configuration Release --no-build
